# Custom OpenOCD configuration for MM32G0001 using CMSIS-DAP (Pico Probe)

# 1. Source the CMSIS-DAP interface (which the Pico Probe exposes)
source [find interface/cmsis-dap.cfg]

# 2. Select SWD transport
transport select swd

# 3. Source the target configuration for stm32f0x (Cortex-M0)
source [find target/stm32f0x.cfg]

# 4. Disable SRST usage since we only have SWD pins (SWCLK, SWDIO, VDD, VSS) connected.
# "reset_config none" tells OpenOCD to only use SWD soft-reset commands (sysresetreq/vectreset)
# and not to toggle any physical reset pin.
reset_config none

# 5. Lower SWD clock speed to 100 kHz for stability with breadboards/wires
adapter speed 100
